name: OpenGrowth Action Smoke Test

on:
  pull_request:
    paths:
      - 'action.yml'
      - 'src/**'
      - 'package.json'
      - 'package-lock.json'
  workflow_dispatch:

jobs:
  action-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run OpenGrowth Local Action
        uses: ./
        with:
          url: https://example.com
          context: "Neutral SaaS customer feedback management demo"
          output: action-test-report
          min-score: 0

      - name: Verify HTML Report Generation
        run: |
          if [ ! -f "action-test-report/report.html" ]; then
            echo "Error: report.html was not generated by the composite action!"
            exit 1
          fi

      - name: Upload Report Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: action-smoke-test-report
          path: action-test-report/
