name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20, 22]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Run tests
        run: npm test

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Smoke test CLI
        run: |
          node dist/cli.js --version
          node dist/cli.js --help
          node dist/cli.js audit https://example.com --output test-report
          if [ ! -f "test-report/report.html" ]; then
            echo "Error: report.html was not generated!"
            exit 1
          fi

      - name: Upload test report
        uses: actions/upload-artifact@v4
        with:
          name: smoke-test-report-node-${{ matrix.node-version }}
          path: test-report/
