name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Run tests
        run: npm test

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Smoke test CLI
        run: |
          node dist/cli.js audit https://example.com --context "Neutral SaaS demo for customer feedback management" --output opengrowth-report
          if [ ! -f "opengrowth-report/report.html" ]; then
            echo "Error: report.html was not generated!"
            exit 1
          fi

      - name: Upload test report
        uses: actions/upload-artifact@v4
        with:
          name: smoke-test-report
          path: opengrowth-report/
